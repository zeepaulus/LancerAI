name: Deploy Production

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Immutable image tag to deploy, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy production over SSH
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
      PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
      PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
      PRODUCTION_DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve production image metadata
        id: meta
        run: |
          tag="${{ inputs.image_tag }}"
          if [ -z "$tag" ]; then
            tag="${GITHUB_REF_NAME}"
          fi
          if ! printf '%s' "$tag" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$'; then
            echo "Production deploy requires an immutable semantic version tag." >&2
            exit 1
          fi
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          {
            echo "image_tag=$tag"
            echo "backend_image=ghcr.io/$owner_lc/lancerai-backend:$tag"
            echo "frontend_image=ghcr.io/$owner_lc/lancerai-frontend:$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Validate required production secrets
        run: |
          test -n "$PRODUCTION_HOST"
          test -n "$PRODUCTION_USER"
          test -n "$PRODUCTION_SSH_KEY"
          test -n "$PRODUCTION_DEPLOY_PATH"
          test -n "$GHCR_USERNAME"
          test -n "$GHCR_TOKEN"

      - name: Log in to GitHub Container Registry for image verification
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release images exist
        run: |
          docker buildx imagetools inspect "${{ steps.meta.outputs.backend_image }}"
          docker buildx imagetools inspect "${{ steps.meta.outputs.frontend_image }}"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PRODUCTION_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$PRODUCTION_HOST" >> ~/.ssh/known_hosts

      - name: Log remote host into GHCR
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key "$PRODUCTION_USER@$PRODUCTION_HOST" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

      - name: Deploy production
        run: |
          ssh -i ~/.ssh/deploy_key "$PRODUCTION_USER@$PRODUCTION_HOST" "
            set -euo pipefail
            cd '$PRODUCTION_DEPLOY_PATH'
            git fetch --tags origin
            git checkout '${{ steps.meta.outputs.image_tag }}'
            BACKEND_IMAGE='${{ steps.meta.outputs.backend_image }}' \
            FRONTEND_IMAGE='${{ steps.meta.outputs.frontend_image }}' \
            ENV_FILE='.env' \
            COMPOSE_PROJECT_NAME='lancerai-production' \
            bash scripts/deploy/compose_deploy.sh
          "
