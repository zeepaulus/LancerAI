name: Release and Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      operation:
        description: "Deploy a release or roll back the selected environment."
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback
      target_environment:
        description: "GitHub Environment to deploy or roll back."
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: "Image tag to deploy. Defaults to the tag name for v* pushes or the current commit short SHA for manual staging deploys."
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-deploy-${{ github.event.inputs.target_environment || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    name: resolve release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      operation: ${{ steps.meta.outputs.operation }}
      deploy_target: ${{ steps.meta.outputs.deploy_target }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      owner_lc: ${{ steps.meta.outputs.owner_lc }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Resolve metadata
        id: meta
        run: |
          operation="${{ github.event.inputs.operation }}"
          deploy_target="${{ github.event.inputs.target_environment }}"
          image_tag="${{ github.event.inputs.image_tag }}"

          if [ -z "$operation" ]; then
            operation="deploy"
          fi
          if [ -z "$deploy_target" ]; then
            deploy_target="production"
          fi
          if [ "$operation" != "deploy" ] && [ "$operation" != "rollback" ]; then
            echo "operation must be deploy or rollback" >&2
            exit 1
          fi
          if [ "$deploy_target" != "staging" ] && [ "$deploy_target" != "production" ]; then
            echo "target_environment must be staging or production" >&2
            exit 1
          fi

          short_sha="$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)"
          if [ -z "$image_tag" ]; then
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              image_tag="${GITHUB_REF_NAME}"
            else
              image_tag="$short_sha"
            fi
          fi

          if [ "$deploy_target" = "production" ] && [ "$operation" = "deploy" ]; then
            if ! printf '%s' "$image_tag" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$'; then
              echo "Production deploy requires an immutable semantic version image tag." >&2
              exit 1
            fi
          fi

          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          {
            echo "operation=$operation"
            echo "deploy_target=$deploy_target"
            echo "image_tag=$image_tag"
            echo "owner_lc=$owner_lc"
            echo "backend_image=ghcr.io/$owner_lc/lancerai-backend:$image_tag"
            echo "frontend_image=ghcr.io/$owner_lc/lancerai-frontend:$image_tag"
          } >> "$GITHUB_OUTPUT"

  build-images:
    name: build and publish immutable images
    if: needs.resolve.outputs.operation == 'deploy'
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: backend
          push: true
          tags: |
            ${{ needs.resolve.outputs.backend_image }}
            ghcr.io/${{ needs.resolve.outputs.owner_lc }}/lancerai-backend:${{ needs.resolve.outputs.deploy_target }}-latest
          cache-from: type=gha,scope=lancerai-backend
          cache-to: type=gha,mode=max,scope=lancerai-backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: frontend-prod
          push: true
          build-args: |
            VITE_API_BASE_URL=
          tags: |
            ${{ needs.resolve.outputs.frontend_image }}
            ghcr.io/${{ needs.resolve.outputs.owner_lc }}/lancerai-frontend:${{ needs.resolve.outputs.deploy_target }}-latest
          cache-from: type=gha,scope=lancerai-frontend
          cache-to: type=gha,mode=max,scope=lancerai-frontend

  github-release:
    name: create GitHub release
    if: needs.resolve.outputs.operation == 'deploy' && needs.resolve.outputs.deploy_target == 'production'
    needs:
      - resolve
      - build-images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or verify release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
          BACKEND_IMAGE: ${{ needs.resolve.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.resolve.outputs.frontend_image }}
        run: |
          notes="$(mktemp)"
          {
            echo "Backend image: $BACKEND_IMAGE"
            echo "Frontend image: $FRONTEND_IMAGE"
          } > "$notes"
          gh release view "$IMAGE_TAG" >/dev/null 2>&1 || \
            gh release create "$IMAGE_TAG" --target "${GITHUB_SHA}" --title "LancerAI $IMAGE_TAG" --notes-file "$notes"

  deploy-staging:
    name: deploy staging
    if: needs.resolve.outputs.operation == 'deploy' && needs.resolve.outputs.deploy_target == 'staging'
    needs:
      - resolve
      - build-images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    env:
      STAGING_HOST: ${{ secrets.STAGING_HOST }}
      STAGING_USER: ${{ secrets.STAGING_USER }}
      STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
      STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      BACKEND_IMAGE: ${{ needs.resolve.outputs.backend_image }}
      FRONTEND_IMAGE: ${{ needs.resolve.outputs.frontend_image }}
    steps:
      - name: Validate required staging secrets
        run: |
          test -n "$STAGING_HOST"
          test -n "$STAGING_USER"
          test -n "$STAGING_SSH_KEY"
          test -n "$STAGING_DEPLOY_PATH"
          test -n "$GHCR_USERNAME"
          test -n "$GHCR_TOKEN"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts

      - name: Log remote host into GHCR
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key "$STAGING_USER@$STAGING_HOST" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

      - name: Deploy staging
        run: |
          ssh -i ~/.ssh/deploy_key "$STAGING_USER@$STAGING_HOST" "
            set -euo pipefail
            cd '$STAGING_DEPLOY_PATH'
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            BACKEND_IMAGE='$BACKEND_IMAGE' \
            FRONTEND_IMAGE='$FRONTEND_IMAGE' \
            ENV_FILE='.env' \
            COMPOSE_PROJECT_NAME='lancerai-staging' \
            bash scripts/deploy/compose_deploy.sh
          "

  deploy-production:
    name: deploy production
    if: needs.resolve.outputs.operation == 'deploy' && needs.resolve.outputs.deploy_target == 'production'
    needs:
      - resolve
      - build-images
      - github-release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
      PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
      PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
      PRODUCTION_DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      BACKEND_IMAGE: ${{ needs.resolve.outputs.backend_image }}
      FRONTEND_IMAGE: ${{ needs.resolve.outputs.frontend_image }}
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
    steps:
      - name: Validate required production secrets
        run: |
          test -n "$PRODUCTION_HOST"
          test -n "$PRODUCTION_USER"
          test -n "$PRODUCTION_SSH_KEY"
          test -n "$PRODUCTION_DEPLOY_PATH"
          test -n "$GHCR_USERNAME"
          test -n "$GHCR_TOKEN"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PRODUCTION_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$PRODUCTION_HOST" >> ~/.ssh/known_hosts

      - name: Log remote host into GHCR
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key "$PRODUCTION_USER@$PRODUCTION_HOST" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

      - name: Deploy production
        run: |
          ssh -i ~/.ssh/deploy_key "$PRODUCTION_USER@$PRODUCTION_HOST" "
            set -euo pipefail
            cd '$PRODUCTION_DEPLOY_PATH'
            git fetch --tags origin
            git checkout '$IMAGE_TAG'
            BACKEND_IMAGE='$BACKEND_IMAGE' \
            FRONTEND_IMAGE='$FRONTEND_IMAGE' \
            ENV_FILE='.env' \
            COMPOSE_PROJECT_NAME='lancerai-production' \
            bash scripts/deploy/compose_deploy.sh
          "

  rollback-staging:
    name: rollback staging
    if: needs.resolve.outputs.operation == 'rollback' && needs.resolve.outputs.deploy_target == 'staging'
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    env:
      STAGING_HOST: ${{ secrets.STAGING_HOST }}
      STAGING_USER: ${{ secrets.STAGING_USER }}
      STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
      STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts

      - name: Log remote host into GHCR
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key "$STAGING_USER@$STAGING_HOST" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

      - name: Roll back staging
        run: |
          ssh -i ~/.ssh/deploy_key "$STAGING_USER@$STAGING_HOST" "
            set -euo pipefail
            cd '$STAGING_DEPLOY_PATH'
            ENV_FILE='.env' COMPOSE_PROJECT_NAME='lancerai-staging' bash scripts/deploy/compose_rollback.sh
          "

  rollback-production:
    name: rollback production
    if: needs.resolve.outputs.operation == 'rollback' && needs.resolve.outputs.deploy_target == 'production'
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
      PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
      PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
      PRODUCTION_DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PRODUCTION_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$PRODUCTION_HOST" >> ~/.ssh/known_hosts

      - name: Log remote host into GHCR
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key "$PRODUCTION_USER@$PRODUCTION_HOST" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

      - name: Roll back production
        run: |
          ssh -i ~/.ssh/deploy_key "$PRODUCTION_USER@$PRODUCTION_HOST" "
            set -euo pipefail
            cd '$PRODUCTION_DEPLOY_PATH'
            ENV_FILE='.env' COMPOSE_PROJECT_NAME='lancerai-production' bash scripts/deploy/compose_rollback.sh
          "
