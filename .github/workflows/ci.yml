name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_LINK_MODE: copy
  APP_ENV: test
  APP_DEBUG: "false"
  AUTH_SECRET_KEY: ci-secret-key-for-lancerai-32chars-minimum
  AUTH_ALLOW_WEAK_SECRET: "false"
  NEO4J_PASSWORD: ci-neo4j-password
  VECTOR_DB_HOST: tests/.chromadb_ci_data
  VECTOR_DB_BACKEND: chroma
  LLM_CACHE_ENABLED: "false"
  STT_MODEL_SIZE: tiny
  STT_MODEL_PATH: ""
  STT_DEVICE: cpu
  TTS_ENGINE: edge
  TTS_MODEL_PATH: ""

jobs:
  workflow-validation:
    name: actionlint, shell, and compose validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub Actions workflows
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7 -color

      - name: Validate deployment shell scripts
        run: |
          bash -n scripts/deploy/compose_deploy.sh
          bash -n scripts/deploy/compose_rollback.sh

      - name: Validate Docker Compose files
        env:
          ENV_FILE: .env.test.example
        run: |
          docker compose config --quiet
          docker compose --env-file .env.test.example -f docker-compose.test.yml config --quiet
          docker compose --env-file .env.test.example -f docker-compose.prod.yml config --quiet

  backend:
    name: backend lint, tests, and migrations
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lancerai_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lancerai_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install backend dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check app tests

      - name: Ruff format check
        run: uv run ruff format --check app tests

      - name: Python compile check
        run: uv run python -m compileall -q app tests

      - name: FastAPI and Celery import check
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          CELERY_BROKER_URL: "redis://localhost:6379/1"
          CELERY_RESULT_BACKEND: "redis://localhost:6379/2"
          NEO4J_URI: "bolt://localhost:7687"
        run: |
          uv run python - <<'PY'
          from app.main import app
          from app.workers.celery_app import celery_app

          assert app.title == "LancerAI API"
          assert "app.workers.crawler_worker.crawl_job_listings" in celery_app.tasks
          assert "app.workers.document_worker.generate_document" in celery_app.tasks
          PY

      - name: Pytest with coverage
        run: uv run pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Validate Alembic migration heads
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/lancerai_ci
        run: |
          heads="$(uv run alembic heads)"
          printf '%s\n' "$heads"
          head_count="$(printf '%s\n' "$heads" | sed '/^[[:space:]]*$/d' | wc -l)"
          test "$head_count" -eq 1

      - name: Run Alembic upgrade on clean PostgreSQL
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/lancerai_ci
        run: |
          uv run alembic upgrade head
          uv run alembic current

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: warn

  frontend:
    name: frontend install, checks, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_BASE_URL: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint if configured
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.lint?0:1)"; then
            npm run lint
          else
            echo "No frontend lint script is configured; skipping lint."
          fi

      - name: Run frontend tests if configured
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.test?0:1)"; then
            npm test -- --run
          else
            echo "No frontend test script is configured; skipping tests."
          fi

      - name: Build frontend production bundle
        run: npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  docker:
    name: docker compose, build, and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      ENV_FILE: .env.test.example
      BACKEND_IMAGE: lancerai-backend:ci
      FRONTEND_IMAGE: lancerai-frontend:ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Compose configurations
        run: |
          docker compose config --quiet
          docker compose --env-file .env.test.example -f docker-compose.test.yml config --quiet
          docker compose --env-file .env.test.example -f docker-compose.prod.yml config --quiet

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: backend
          tags: lancerai-backend:ci
          load: true
          cache-from: type=gha,scope=lancerai-backend
          cache-to: type=gha,mode=max,scope=lancerai-backend

      - name: Build frontend production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: frontend-prod
          tags: lancerai-frontend:ci
          load: true
          build-args: |
            VITE_API_BASE_URL=
          cache-from: type=gha,scope=lancerai-frontend
          cache-to: type=gha,mode=max,scope=lancerai-frontend

      - name: Start lightweight smoke stack
        run: |
          docker compose -p lancerai-ci-smoke --env-file .env.test.example -f docker-compose.test.yml up -d --no-build postgres redis frontend
          docker compose -p lancerai-ci-smoke --env-file .env.test.example -f docker-compose.test.yml run --rm --no-deps backend uv run --no-sync alembic upgrade head
          docker compose -p lancerai-ci-smoke --env-file .env.test.example -f docker-compose.test.yml up -d --no-build backend

      - name: Run container smoke checks
        run: |
          curl --retry 30 --retry-delay 3 --retry-all-errors --fail http://localhost:18000/health
          curl --retry 30 --retry-delay 3 --retry-all-errors --fail http://localhost:18000/ready
          curl --retry 20 --retry-delay 3 --retry-all-errors --fail http://localhost:13000/health

      - name: Upload Docker Compose logs on failure
        if: failure()
        run: docker compose -p lancerai-ci-smoke -f docker-compose.test.yml logs --no-color > docker-compose-smoke.log

      - name: Save Docker Compose logs artifact
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-compose-smoke-logs
          path: docker-compose-smoke.log
          if-no-files-found: warn

      - name: Stop smoke stack
        if: always()
        run: docker compose -p lancerai-ci-smoke -f docker-compose.test.yml down -v --remove-orphans
