name: Workflow Validation

on:
  pull_request:
    branches: [main, dev]
    paths:
      - ".github/**"
      - "docker-compose*.yml"
      - "scripts/**"
      - ".env.test.example"
  push:
    branches: [main]
    paths:
      - ".github/**"
      - "docker-compose*.yml"
      - "scripts/**"
      - ".env.test.example"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-workflows-and-scripts:
    name: actionlint, shell, and compose validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub Actions workflows
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7 -color

      - name: Validate deployment shell scripts
        run: |
          bash -n scripts/deploy/compose_deploy.sh
          bash -n scripts/deploy/compose_rollback.sh

      - name: Validate Docker Compose files
        env:
          ENV_FILE: .env.test.example
        run: |
          docker compose config --quiet
          docker compose --env-file .env.test.example -f docker-compose.test.yml config --quiet
          docker compose --env-file .env.test.example -f docker-compose.prod.yml config --quiet
