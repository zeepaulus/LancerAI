name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: validate, publish images, and create release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        run: |
          version="${{ inputs.version }}"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME}"
          fi
          if ! printf '%s' "$version" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$'; then
            echo "Version must look like v1.2.3 or 1.2.3" >&2
            exit 1
          fi
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          short_sha="$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)"
          {
            echo "version=$version"
            echo "short_sha=$short_sha"
            echo "backend_image=ghcr.io/$owner_lc/lancerai-backend"
            echo "frontend_image=ghcr.io/$owner_lc/lancerai-frontend"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install backend dependencies
        run: uv sync --frozen

      - name: Backend release validation
        run: |
          uv run ruff check app tests
          uv run python -m compileall -q app tests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend artifact
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ""
        run: |
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.backend_image }}:latest
          cache-from: type=gha,scope=lancerai-backend
          cache-to: type=gha,mode=max,scope=lancerai-backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: frontend-prod
          push: true
          build-args: |
            VITE_API_BASE_URL=
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.frontend_image }}:latest
          cache-from: type=gha,scope=lancerai-frontend
          cache-to: type=gha,mode=max,scope=lancerai-frontend

      - name: Write build metadata
        run: |
          cat > release-metadata.json <<EOF
          {
            "version": "${{ steps.meta.outputs.version }}",
            "commit": "${GITHUB_SHA}",
            "backend_image": "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.version }}",
            "frontend_image": "${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.version }}"
          }
          EOF

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ steps.meta.outputs.version }}
          path: |
            frontend/dist
            release-metadata.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.version }}" \
            --target "${GITHUB_SHA}" \
            --title "LancerAI ${{ steps.meta.outputs.version }}" \
            --notes-file release-metadata.json \
            --latest
