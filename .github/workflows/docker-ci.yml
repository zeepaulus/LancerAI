name: Docker CI

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose*.yml"
      - ".env.test.example"
      - "app/**"
      - "migration/**"
      - "frontend/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docker-ci.yml"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose*.yml"
      - ".env.test.example"
      - "app/**"
      - "migration/**"
      - "frontend/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docker-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: compose, build, and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      ENV_FILE: .env.test.example
      BACKEND_IMAGE: lancerai-backend:ci
      FRONTEND_IMAGE: lancerai-frontend:ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Compose configurations
        run: |
          docker compose config --quiet
          docker compose --env-file .env.test.example -f docker-compose.test.yml config --quiet
          docker compose --env-file .env.test.example -f docker-compose.prod.yml config --quiet

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: backend
          tags: lancerai-backend:ci
          load: true
          cache-from: type=gha,scope=lancerai-backend
          cache-to: type=gha,mode=max,scope=lancerai-backend

      - name: Build frontend production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: frontend-prod
          tags: lancerai-frontend:ci
          load: true
          build-args: |
            VITE_API_BASE_URL=
          cache-from: type=gha,scope=lancerai-frontend
          cache-to: type=gha,mode=max,scope=lancerai-frontend

      - name: Start lightweight smoke stack
        run: |
          docker compose -p lancerai-ci-smoke --env-file .env.test.example -f docker-compose.test.yml up -d --no-build postgres redis frontend
          docker compose -p lancerai-ci-smoke --env-file .env.test.example -f docker-compose.test.yml run --rm --no-deps backend uv run --no-sync alembic upgrade head
          docker compose -p lancerai-ci-smoke --env-file .env.test.example -f docker-compose.test.yml up -d --no-build backend

      - name: Run container smoke checks
        run: |
          curl --retry 30 --retry-delay 3 --retry-all-errors --fail http://localhost:18000/health
          curl --retry 30 --retry-delay 3 --retry-all-errors --fail http://localhost:18000/ready
          curl --retry 20 --retry-delay 3 --retry-all-errors --fail http://localhost:13000/health

      - name: Upload Docker Compose logs on failure
        if: failure()
        run: docker compose -p lancerai-ci-smoke -f docker-compose.test.yml logs --no-color > docker-compose-smoke.log

      - name: Save Docker Compose logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-smoke-logs
          path: docker-compose-smoke.log
          if-no-files-found: warn

      - name: Stop smoke stack
        if: always()
        run: docker compose -p lancerai-ci-smoke -f docker-compose.test.yml down -v --remove-orphans
