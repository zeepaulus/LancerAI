name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy. Defaults to the current commit short SHA."
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  build-images:
    name: build and push staging images
    runs-on: ubuntu-latest
    timeout-minutes: 55
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      owner_lc: ${{ steps.meta.outputs.owner_lc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta
        run: |
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          short_sha="$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)"
          tag="${{ inputs.image_tag }}"
          if [ -z "$tag" ]; then
            tag="$short_sha"
          fi
          backend="ghcr.io/$owner_lc/lancerai-backend:$tag"
          frontend="ghcr.io/$owner_lc/lancerai-frontend:$tag"
          {
            echo "owner_lc=$owner_lc"
            echo "backend_image=$backend"
            echo "frontend_image=$frontend"
            echo "staging_tag=$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/lancerai-backend:staging-latest
          cache-from: type=gha,scope=lancerai-backend
          cache-to: type=gha,mode=max,scope=lancerai-backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: frontend-prod
          push: true
          build-args: |
            VITE_API_BASE_URL=
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/lancerai-frontend:staging-latest
          cache-from: type=gha,scope=lancerai-frontend
          cache-to: type=gha,mode=max,scope=lancerai-frontend

  deploy:
    name: deploy staging over SSH
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-images
    environment: staging
    env:
      STAGING_HOST: ${{ secrets.STAGING_HOST }}
      STAGING_USER: ${{ secrets.STAGING_USER }}
      STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
      STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      BACKEND_IMAGE: ${{ needs.build-images.outputs.backend_image }}
      FRONTEND_IMAGE: ${{ needs.build-images.outputs.frontend_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required staging secrets
        run: |
          test -n "$STAGING_HOST"
          test -n "$STAGING_USER"
          test -n "$STAGING_SSH_KEY"
          test -n "$STAGING_DEPLOY_PATH"
          test -n "$GHCR_USERNAME"
          test -n "$GHCR_TOKEN"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts

      - name: Log remote host into GHCR
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key "$STAGING_USER@$STAGING_HOST" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

      - name: Deploy staging
        run: |
          ssh -i ~/.ssh/deploy_key "$STAGING_USER@$STAGING_HOST" "
            set -euo pipefail
            cd '$STAGING_DEPLOY_PATH'
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            BACKEND_IMAGE='$BACKEND_IMAGE' \
            FRONTEND_IMAGE='$FRONTEND_IMAGE' \
            ENV_FILE='.env' \
            COMPOSE_PROJECT_NAME='lancerai-staging' \
            bash scripts/deploy/compose_deploy.sh
          "
