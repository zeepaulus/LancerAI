# PostgreSQL, Redis, ChromaDB, Neo4j — luồng dev: docker compose up -d rồi chạy backend/frontend local.
services:
  postgres:
    image: postgres:16-alpine
    container_name: lancerai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lancerai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lancerai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Pin to same release line as Python chromadb (see uv.lock). 0.5.x servers break chromadb>=1 HTTP API.
  chromadb:
    image: chromadb/chroma:1.5.8
    container_name: lancerai-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

  neo4j:
    image: neo4j:5-community
    container_name: lancerai-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/dev-password-change-me}
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  neo4j_data:
